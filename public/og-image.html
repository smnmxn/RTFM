<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>SupportPages OG Image</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #09090b;
      font-family: 'Inter', system-ui, sans-serif;
      position: relative;
    }

    /* Gradient orbs — exact match of home page sessions/new.html.erb */
    .orb-1 {
      position: absolute;
      top: -20%;
      left: -10%;
      width: 600px;
      height: 600px;
      border-radius: 50%;
      /* bg-zinc-500/12 = rgba(113,113,122,0.12) */
      background: rgba(113, 113, 122, 0.12);
      filter: blur(64px);
      pointer-events: none;
    }

    .orb-2 {
      position: absolute;
      top: 30%;
      right: -15%;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      /* bg-zinc-400/12 = rgba(161,161,170,0.12) */
      background: rgba(161, 161, 170, 0.12);
      filter: blur(64px);
      pointer-events: none;
    }

    .orb-3 {
      position: absolute;
      bottom: -10%;
      left: 20%;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      /* bg-zinc-600/12 = rgba(82,82,91,0.12) */
      background: rgba(82, 82, 91, 0.12);
      filter: blur(64px);
      pointer-events: none;
    }

    .content {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 60px 80px;
    }

    /* Logo top-left */
    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo img {
      width: 44px;
      height: 44px;
      border-radius: 10px;
    }

    .logo span {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 26px;
      font-weight: 700;
      color: #f4f4f5;
      letter-spacing: -0.02em;
    }

    /* Screenshot */
    .screenshot {
      display: flex;
      justify-content: center;
      flex-shrink: 0;
    }

    .screenshot img {
      max-width: 700px;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }

    /* Centered headline */
    .headline-wrapper {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* text-gradient-hero from application.css */
    .headline {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 64px;
      font-weight: 700;
      text-align: center;
      line-height: 1.15;
      letter-spacing: -0.03em;
      max-width: 900px;
      background: linear-gradient(135deg, #e4e4e7 0%, #a1a1aa 50%, #f4f4f5 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* CTA button */
    .cta {
      margin-top: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 16px 40px;
      background: #ffffff;
      color: #09090b;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 18px;
      font-weight: 600;
      border-radius: 12px;
      letter-spacing: -0.01em;
    }

    /* URL bottom-right */
    .url {
      position: absolute;
      bottom: 50px;
      right: 80px;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 18px;
      font-weight: 500;
      color: #71717a;
      letter-spacing: -0.01em;
    }
  </style>
</head>
<body>
  <div class="orb-1"></div>
  <div class="orb-2"></div>
  <div class="orb-3"></div>

  <div class="content">
    <div class="logo">
      <img src="icon.png" alt="">
      <span>SupportPages.io</span>
    </div>

    <div class="headline-wrapper">
      <div class="screenshot">
        <img src="images/og-screenshot.png" alt="">
      </div>
      <h1 class="headline">Your docs, always<br>up to date.</h1>
      <div class="cta">Get Early Access</div>
    </div>
  </div>

  <div class="url">supportpages.io</div>
</body>
</html>
